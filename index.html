<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation in JS</title>
</head>
<body>
    <h1>Validation in JS</h1>
    <form name="myform" onclick="myfunction()">
        <label type="name" for="fname" >Enter Name here: </label>
        <input type="text" name="fname"><br><br>
        Enter your age: <input id="demo" type="number" min="18" required>
        <button onclick="myfunction()">Submit</button>
    </form>
    <p id="result"></p>
    <script>
        function myfunction(){
            var x = document.getElementById("demo").value;
            var y = document.forms["myform"]["fname"].value;
            var pattern = /^[A-Za-z]+$/
            if (!x.checkValidity()) {
                document.getElementById("result").innerHTML = x.validationMessage;
                return false;
            }
            else if{
                document.getElementById("result").innerHTML = "Successful!";
                return true;
            }
            else (y == '') {
                alert("The name must be filled.");
                return false;
            }

            else if (pattern.test(x) == false) {
                alert("The name can only contain alphabets.");
                return false;
            }

            else document.write("Login Succesful!")

            
        }
    </script>
</body>
</html>

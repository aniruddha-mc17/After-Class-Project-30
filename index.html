<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation in JS</title>
</head>

<body>
    <h1>Validation in JS</h1>
    <form name="myform" onsubmit="return myfunction()">
        <label type="name" for="fname">Enter Name here: </label>
        <input type="text" name="fname" id="name"><br><br>
        <label type="number" for="age">Enter your Age: </label>
        <input id="age" name="age" type="number" min="18" required>
        <button type="submit">Submit</button>
    </form>
    <div id="result"></p>
    <script>
        function myfunction() {
            let isValid = true;
            const name = document.getElementById("name").value;
            const age = document.getElementById("age");
            var pattern = /^[A-Za-z]+$/;
            if (name == "") {
                alert("The name must be filled.");
                isValid = false;
            }
            if (pattern.test(name)==false) {
                alert("The name can only contain alphabets.");
                isValid = false;
            } if (!age.checkValidity()) {
                document.getElementById("result").innerHTML = age.validationMessage;
                isValid = false;
            } 
            if(isValid){
                alert("Form Submitted Succesfully!");
                return false;
            }else{
               return false;
            }
        }
    </script>
</body>

</html>
